version: 2
updates:
  # Go backend
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend (pnpm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Dockerfile base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
