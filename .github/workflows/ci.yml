name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Go lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend lint
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
      - uses: azure/setup-helm@v5
      - name: Chart lint
        run: helm lint --strict deploy/helm

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # The tests/ package is an integration suite that needs a live Ceph
      # endpoint, so it is excluded here.
      - name: Go test
        run: go test $(go list ./... | grep -v /tests)
      - uses: azure/setup-helm@v5
      - name: Validate chart manifests
        # CRDs (e.g. Contour HTTPProxy) have no upstream schema, so they are skipped.
        run: |
          helm template s3-panel deploy/helm --set snapp-object-store.enabled=true > manifests.yaml
          curl -sSfL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar -xz kubeconform
          ./kubeconform -strict -ignore-missing-schemas -summary manifests.yaml

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (frontend + backend in one image)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: s3-panel:ci
