name: Release

# Triggered by a semver tag (e.g. v1.2.3). Publishes the backend and frontend
# container images and the Helm chart (as an OCI artifact) to GHCR.
on:
  push:
    tags:
      # semver tags, with or without a leading "v" (repo convention is no "v")
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: snapp-incubator

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/s3-panel:${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/s3-panel:latest

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: azure/setup-helm@v5
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin
      - name: Package chart
        run: helm package deploy/helm --version "${{ steps.version.outputs.value }}" --app-version "${{ steps.version.outputs.value }}"
      - name: Push chart (OCI)
        run: helm push "s3-panel-${{ steps.version.outputs.value }}.tgz" "oci://${{ env.REGISTRY }}/${{ env.NAMESPACE }}/charts"
