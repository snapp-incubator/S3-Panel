definitions:
  objectstorage.BucketCreateResponse:
    properties:
      created:
        type: boolean
    type: object
  objectstorage.BucketDeleteResponse:
    properties:
      deleted:
        type: boolean
      has_objects:
        type: boolean
    type: object
  objectstorage.BucketListResponse:
    properties:
      items:
        items:
          type: string
        type: array
    type: object
  objectstorage.BucketQuotaResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/objectstorage.SingleBucketQuotaResponse'
        type: array
    type: object
  objectstorage.ObjectDeleteResponse:
    properties:
      deleted:
        type: boolean
    type: object
  objectstorage.ObjectDownloadResponse:
    properties:
      downloaded:
        type: boolean
    type: object
  objectstorage.ObjectHeadResponse:
    properties:
      exists:
        type: boolean
    type: object
  objectstorage.ObjectListBody:
    properties:
      last_modified_timestamp:
        type: string
      name:
        type: string
      size_unit:
        type: string
      size_value:
        type: number
    type: object
  objectstorage.ObjectListResponse:
    properties:
      has_next_page:
        type: boolean
      items:
        items:
          $ref: '#/definitions/objectstorage.ObjectListBody'
        type: array
    type: object
  objectstorage.ObjectUploadResponse:
    properties:
      created:
        type: boolean
    type: object
  objectstorage.OperationErrWithMsg:
    properties:
      message:
        type: string
    type: object
  objectstorage.SingleBucketQuotaResponse:
    properties:
      access:
        type: string
      bucket:
        type: string
      hard_bytes:
        type: number
      hard_bytes_unit:
        type: string
      hard_objects:
        type: integer
      modify_time_stamp:
        type: string
      quota_enabled:
        type: boolean
      tenant:
        type: string
      used_bytes:
        type: number
      used_bytes_unit:
        type: string
      used_objects:
        type: integer
    type: object
  objectstorage.UserIdentificationResponse:
    properties:
      display_name:
        type: string
      suspended:
        type: integer
      team:
        type: string
      user_not_found:
        type: boolean
      userID:
        type: string
    type: object
  objectstorage.UserQuotaResponse:
    properties:
      hard_buckets:
        type: integer
      hard_bytes:
        type: number
      hard_bytes_raw:
        type: integer
      hard_bytes_unit:
        type: string
      hard_objects:
        type: integer
      quota_enabled:
        type: boolean
      used_buckets:
        type: integer
      used_bytes:
        type: number
      used_bytes_raw:
        type: integer
      used_bytes_unit:
        type: string
      used_objects:
        type: integer
    type: object
info:
  contact:
    email: cloud-platform@snappcloud.io
    name: Cloud-Platform
    url: https://docs.snappcloud.io/docs/servicedesk
  description: Serves the S3 backend APIs
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://swagger.io/terms/
  title: ObjectStorage Backend Swagger
  version: "1.0"
paths:
  /api/bucket/create:
    post:
      consumes:
      - application/json
      description: Creates bucket for a user
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: Bucket Name to Create
        in: body
        name: bucket
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "201":
          description: Bucket created successfully
          schema:
            $ref: '#/definitions/objectstorage.BucketCreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Bucket Already Exists / Bucket creation quota exceeded
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Creates Bucket
      tags:
      - Bucket
  /api/bucket/delete:
    delete:
      consumes:
      - application/json
      description: Deletes bucket for a user
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: Bucket Name to Delete
        in: body
        name: bucket
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Bucket deleted successfully
          schema:
            $ref: '#/definitions/objectstorage.BucketDeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Deletes Bucket
      tags:
      - Bucket
  /api/bucket/list:
    get:
      consumes:
      - application/json
      description: Fetches list of buckets owned by a user that is specified by AccessKey
        and SecretKey
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: search by given string, could be empty
        in: query
        name: search_string
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with bucket list
          schema:
            $ref: '#/definitions/objectstorage.BucketListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: List of buckets of a user
      tags:
      - Bucket
  /api/bucket/quota:
    get:
      consumes:
      - application/json
      description: Fetches Quota of buckets owned by a user that is specified by AccessKey.
        if status code is 200 and the BucketQuotaResponse hard_bytes or hard_objects
        is -1, mean no limitation on quota_storage or quota_objects is applied.
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: search by given string, could be empty
        in: query
        name: search_string
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with buckets quota
          schema:
            $ref: '#/definitions/objectstorage.BucketQuotaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Quota of buckets of a user
      tags:
      - Bucket
  /api/object/delete:
    delete:
      consumes:
      - application/json
      description: Deletes a list of objects specified by name
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: bucket name
        in: query
        name: bucket
        required: true
        type: string
      - collectionFormat: csv
        description: objects names
        in: query
        items:
          type: string
        name: objects
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with objects delete
          schema:
            $ref: '#/definitions/objectstorage.ObjectDeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Object Does not exist
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Deletes the list of objects inside a bucket
      tags:
      - Object
  /api/object/download:
    get:
      consumes:
      - application/json
      description: This functions downloads an object from bucket.
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: bucket name
        in: query
        name: bucket
        required: true
        type: string
      - description: object name
        in: query
        name: object
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with bucket download
          schema:
            $ref: '#/definitions/objectstorage.ObjectDownloadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: download an object to bucket
      tags:
      - Object
  /api/object/head:
    get:
      consumes:
      - application/json
      description: check if an object exists
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: bucket name
        in: body
        name: bucket
        required: true
        schema:
          type: string
      - description: objects name
        in: body
        name: object
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with objects head
          schema:
            $ref: '#/definitions/objectstorage.ObjectHeadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: check if an object exists
      tags:
      - Object
  /api/object/list:
    get:
      consumes:
      - application/json
      description: Fetches list of buckets owned by a user that is specified by AccessKey
        and SecretKey
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: bucket name
        in: query
        name: bucket
        required: true
        type: string
      - description: max_keys of pagination
        in: query
        name: max_keys
        required: true
        type: string
      - description: page of pagination
        in: query
        name: page
        required: true
        type: string
      - description: search by given string, could be empty
        in: query
        name: search_string
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with bucket list
          schema:
            $ref: '#/definitions/objectstorage.ObjectListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: List of objects of a bucket
      tags:
      - Object
  /api/object/upload:
    post:
      consumes:
      - multipart/form-data
      description: This functions uploads an object to bucket.
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      - description: User given SecretKey
        in: header
        name: secret_key
        required: true
        type: string
      - description: bucket name
        in: formData
        name: bucket
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with bucket upload
          schema:
            $ref: '#/definitions/objectstorage.ObjectUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "409":
          description: Already Exists
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: upload an object to bucket
      tags:
      - Object
  /api/user/id:
    get:
      consumes:
      - application/json
      description: Fetch User Identification information using AccessKey
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with user identification
          schema:
            $ref: '#/definitions/objectstorage.UserIdentificationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Fetch User Identification information using AccessKey
      tags:
      - User
  /api/user/quota:
    get:
      consumes:
      - application/json
      description: Fetches Quota Information
      parameters:
      - description: User given AccessKey
        in: header
        name: access_key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successful response with user quota
          schema:
            $ref: '#/definitions/objectstorage.UserQuotaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Action didn't complete
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/objectstorage.OperationErrWithMsg'
      summary: Fetch User Quota from AccessKey
      tags:
      - User
swagger: "2.0"
