apiVersion: template.openshift.io/v1
kind: Template
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: ${APP_NAME}
      name: ${APP_NAME}
      annotations:
        commit_timestamp: ${COMMIT_TIMESTAMP}
    spec:
      replicas: ${{REPLICA}}
      selector:
        matchLabels:
          app: ${APP_NAME}
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 1
      template:
        metadata:
          labels:
            app: ${APP_NAME}
        spec:
          containers:
            - name: ${APP_NAME}
              image: '${IMAGE_URL}:${IMAGE_TAG}'
              imagePullPolicy: Always
              ports:
                - name: pwa-port
                  containerPort: ${{PORT}}
                  protocol: TCP
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  port: pwa-port
                  scheme: HTTP
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 1
                initialDelaySeconds: 10
              env:
                - name: SERVICE_NAMESPACE
                  value: ${SERVICE_NAMESPACE}
                - name: CLUSTER_NAME
                  value: ${CLUSTER_NAME}
              envFrom:
                - configMapRef:
                    name: ${APP_NAME}-env
              volumeMounts:
                - mountPath: /etc/nginx/conf.d/default.conf
                  subPath: default.conf
                  name: nginx-config-volume
                - mountPath: /etc/runtime-variables
                  name: runtime-variables-volume
          volumes:
            - name: nginx-config-volume
              configMap:
                name: ${APP_NAME}
              terminationMessagePath: /dev/termination-log
            - name: runtime-variables-volume
              configMap:
                name: ${CONFIG_MAP_NAME}-env
              terminationMessagePath: /dev/termination-log
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          terminationGracePeriodSeconds: 30
      triggers: []

  - apiVersion: v1
    kind: Service
    metadata:
      annotations:
      labels:
        app: ${APP_NAME}
      name: ${APP_NAME}
    spec:
      ports:
        - name: ${PORT}-tcp
          port: ${{PORT}}
          protocol: TCP
          targetPort: ${{PORT}}
      selector:
        app: ${APP_NAME}
      sessionAffinity: None
      type: ClusterIP

  - apiVersion: v1
    kind: Route
    metadata:
      labels:
        app: ${APP_NAME}
        router: private
      name: ${APP_NAME}
    spec:
      host: ${ROUTE_HOST}
      port:
        targetPort: ${PORT}-tcp
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
      to:
        kind: Service
        name: ${APP_NAME}
        weight: 100
      wildcardPolicy: None

parameters:
  - name: APP_NAME
    displayName: Application name
    required: true

  - name: PROJECT_NAME
    displayName: Project Name
    description: The name used for image
    required: true

  - name: ROUTE_HOST
    displayName: Environment name
    required: true

  - name: PORT
    displayName: Port exposed in Dockerfile
    required: true

  - name: IMAGE_URL
    displayName: Registry image url
    required: true

  - name: IMAGE_TAG
    displayName: Docker image tag
    required: true

  - name: SERVICE_NAMESPACE
    displayName: Service namespace
    required: false

  - name: CLUSTER_NAME
    displayName: Cluster name
    required: false

  - name: CONFIG_MAP_NAME
    displayName: ConfigMap name
    required: false

  - name: REPLICA
    displayName: Replica count
    required: true

  - name: COMMIT_TIMESTAMP
    displayName: Commit timestamp
    required: true
