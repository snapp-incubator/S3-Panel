snapp-object-store:
  enabled: false
  replica: 1
  image: image-registry.openshift-image-registry.svc:5000/snappcloud-unified-panel/snapp_object_store:0.2.1
  fqdn: ""
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 1
      memory: 2Gi
  config:
    url: ""
    address: "0.0.0.0"
    port: 8080
    log_level: "warn"
    auth_enabled: "false"
    # Serve the embedded frontend (set false for API-only instances).
    serve_frontend: true
    # Name of the region this instance serves directly (e.g. "teh-1").
    region: ""
    # Map of other region name -> backend URL. When the frontend is served,
    # requests for those regions are reverse-proxied there. e.g.
    #   region_endpoints:
    #     teh-2: http://s3-panel.apps.private.okd4.teh-2.snappcloud.io
    region_endpoints: {}