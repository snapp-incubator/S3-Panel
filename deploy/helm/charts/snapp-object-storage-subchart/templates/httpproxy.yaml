{{- if .Values.enabled }}
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: {{ include "snappobjectstore.name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  httpVersions:
  - http/1.1
  ingressClassName: private
  routes:
  - enableWebsockets: true
    loadBalancerPolicy:
      strategy: RoundRobin
    services:
    - name: {{ include "snappobjectstore.name" . }}-service
      port: {{ .Values.config.port }}
      weight: 100
    timeoutPolicy:
      idleConnection: 15s
      response: 30s
  virtualhost:
    fqdn: {{ .Values.fqdn }}
    corsPolicy:
        allowCredentials: true
        allowPrivateNetwork: true
        allowOrigin:
          - "*"
        allowMethods:
          - GET
          - POST
          - OPTIONS
          - DELETE
          - PUT
        allowHeaders:
          - '*'
        exposeHeaders:
          - Content-Length
          - Content-Range
        maxAge: "10m" # preflight requests can be cached for 10 minutes.
    tls:
      enableFallbackCertificate: true
      secretName: openshift-ingress/letsencrypt
{{- end }}