{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "snappobjectstore.name" . }}-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.config.port }}
      targetPort: {{ .Values.config.port }}
      protocol: TCP
  selector:
    app: {{ include "snappobjectstore.name" . }}-backend
{{- end }}