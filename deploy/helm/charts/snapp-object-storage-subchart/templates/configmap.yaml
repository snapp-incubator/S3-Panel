{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "snappobjectstore.name" . }}-app-config
  namespace: {{ .Release.Namespace }}
data:
  config.toml: |
    [logger]
    level = {{ .Values.config.log_level | default "warn" | quote }}

    [server]
    address = {{ .Values.config.address | default "0.0.0.0" | quote }}
    port = {{ .Values.config.port | default 8080 | quote }}
    auth_enabled = {{ .Values.config.auth_enabled | default "false" | quote }}
    auth_key_lookup = "header:Authorization"
    auth_token = {{ .Values.auth_token | default "" | quote }}
    download_path = {{ .Values.config.download_path | default "/tmp" | quote }}
    serve_frontend = {{ dig "serve_frontend" true .Values.config }}
    region = {{ .Values.config.region | default "" | quote }}
{{- with .Values.config.region_endpoints }}

    [server.region_endpoints]
{{- range $name, $url := . }}
    {{ $name | quote }} = {{ $url | quote }}
{{- end }}
{{- end }}

    [object_storage_config]
    url = {{ .Values.config.url | default "" | quote }}
    access_key = {{ .Values.access_key | default "" | quote }}
    secret_key = {{ .Values.secret_key | default "" | quote }}
{{- end }}